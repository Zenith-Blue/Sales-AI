<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="lp-wrapper">

    <!-- FV Section -->
    <section class="fv">
      <!-- Background image -->
      <img
        class="fv__bg"
        src="https://www.figma.com/api/mcp/asset/32b3ffe2-83d9-4d4d-9eaf-b7993c12980c"
        alt=""
      />

      <!-- Right person image -->
      <div class="fv__person">
        <img
          src="https://www.figma.com/api/mcp/asset/96c12bf1-f3a6-4d2c-98a7-7b852a0f53fc"
          alt=""
        />
      </div>

      <!-- Left content -->
      <div class="fv__content">

        <!-- Worry list -->
        <div class="fv__worries">
          <div class="fv__worry-item">
            <img class="fv__check" src="https://www.figma.com/api/mcp/asset/3bd1fe91-865f-46eb-80b7-ac1ecd73a6c2" alt="" />
            <p class="fv__worry-text">営業なんて<span class="fv__ul">一度もやったことない…</span></p>
          </div>
          <div class="fv__worry-item">
            <img class="fv__check" src="https://www.figma.com/api/mcp/asset/3bd1fe91-865f-46eb-80b7-ac1ecd73a6c2" alt="" />
            <p class="fv__worry-text">スクールで学んでも、<span class="fv__ul">案件が取れるか不安</span></p>
          </div>
          <div class="fv__worry-item">
            <img class="fv__check" src="https://www.figma.com/api/mcp/asset/3bd1fe91-865f-46eb-80b7-ac1ecd73a6c2" alt="" />
            <p class="fv__worry-text"><span class="fv__ul">稼げるようになりたい、</span>　<span class="fv__ul">失敗したくない</span></p>
          </div>
        </div>

        <!-- Main headline -->
        <div class="fv__headlines">
          <div class="fv__headline fv__headline--full">
            <p class="fv__headline-text">
              <span class="fv__text-white fv__text-lg">未経験から</span><span class="fv__text-gradient fv__text-lg">自由に稼げる営業力</span><span class="fv__text-white fv__text-sm">を</span>
            </p>
          </div>
          <div class="fv__headline fv__headline--inline">
            <p class="fv__headline-text fv__headline-text--wide">
              <span class="fv__text-white fv__text-lg">身</span><span class="fv__text-white fv__text-sm">につける</span><span class="fv__text-white fv__text-lg">唯一</span><span class="fv__text-white fv__text-sm">の</span><span class="fv__text-white fv__text-lg">スクール</span>
            </p>
          </div>
        </div>

        <!-- Badge image -->
        <div class="fv__badges">
          <div class="fv__badges-frame">
            <img
              src="https://www.figma.com/api/mcp/asset/e7da4b2f-3859-44af-a2db-b6bdd95ed1b9"
              alt="最短2ヶ月で卒業可能・18項目充実カリキュラム・200P超専用教科書"
            />
          </div>
        </div>

        <!-- CTA -->
        <div class="fv__cta-wrap">
          <a href="#line" class="fv__cta-link">
            <img
              src="https://www.figma.com/api/mcp/asset/59b38eea-6297-4f20-9423-0e34bb8037a2"
              alt="無料で豪華特典を受け取る"
              class="fv__cta-img"
            />
          </a>
          <p class="fv__cta-note">
            先着5名限定 <span class="fv__cta-note--dark">メンターとの60分間 無料面談</span>プレゼント
          </p>
        </div>

      </div>
    </section>

    <!-- Reassure Section -->
    <section class="reassure">
      <img class="reassure__bg" src="https://www.figma.com/api/mcp/asset/6aaa3875-ff6d-4839-9595-54c4091927c5" alt="" />
      <div class="reassure__panel">
        <div class="reassure__content">
          <!-- Headline -->
          <div class="reassure__headline">
            <p class="reassure__sub">自分もできるかな…と思ったあなた</p>
            <div class="reassure__title-wrap">
              <span class="reassure__title-highlight"></span>
              <p class="reassure__title">ご安心ください!</p>
            </div>
          </div>
          <!-- Photo -->
          <div class="reassure__photo">
            <img src="https://www.figma.com/api/mcp/asset/0cb210ba-e9e5-48aa-a82d-691253006aff" alt="" />
          </div>
          <!-- Caption -->
          <p class="reassure__caption">
            生徒のほとんどが<span class="reassure__caption-em">営業未経験</span>です!
          </p>
          <!-- CTA -->
          <div class="reassure__cta-wrap">
            <a href="#line" class="reassure__cta-link">
              <img src="https://www.figma.com/api/mcp/asset/aaf18eb2-80fe-4d0d-b26d-cd2b6918bd64" alt="無料で豪華特典を受け取る" class="reassure__cta-img" />
            </a>
            <p class="reassure__cta-note">
              先着5名限定 <span class="reassure__cta-note--dark">メンターとの60分間 無料面談</span>プレゼント
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- Gifts Section -->
    <section class="gifts">
      <img class="gifts__bg" src="https://www.figma.com/api/mcp/asset/d975dc4e-aaa6-456b-b432-b6013e64312b" alt="" />
      <div class="gifts__inner">
        <div class="gifts__center">
          <!-- Pill button -->
          <div class="gifts__pill-wrap">
            <div class="gifts__pill">
              <p class="gifts__pill-text">まずはあなたが今感じている<span class="gifts__pill-accent">不安を整理</span>してみましょう</p>
              <img class="gifts__pill-arrow" src="https://www.figma.com/api/mcp/asset/fecef204-ce4a-472d-bbc3-f4184c487dba" alt="" />
            </div>
          </div>
          <!-- Subtitle + headline -->
          <div class="gifts__text-block">
            <p class="gifts__subtitle">LINEお友だち登録者限定</p>
            <p class="gifts__headline">
              <span class="gifts__hl-sm">今の</span><span class="gifts__hl-lg">自分の課題</span><span class="gifts__hl-sm">がわかる! </span><span class="gifts__hl-golden">7大特典</span><span class="gifts__hl-sm"> プレゼント</span>
            </p>
          </div>
        </div>
        <!-- Books image -->
        <div class="gifts__books-frame">
          <img class="gifts__books-img" src="https://www.figma.com/api/mcp/asset/06d1e24a-604b-449e-b7a6-2207075fcc88" alt="" />
        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
