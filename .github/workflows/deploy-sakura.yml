name: Deploy to Sakura

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-sakura
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SAKURA_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SAKURA_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          SAKURA_HOST: ${{ secrets.SAKURA_HOST }}
          SAKURA_USER: ${{ secrets.SAKURA_USER }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='node_modules/' \
            --exclude='tests/' \
            --exclude='test-results/' \
            --exclude='playwright-report/' \
            --exclude='docs/' \
            --exclude='scripts/' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='playwright.config.js' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            ./ "${SAKURA_USER}@${SAKURA_HOST}:/home/businessgate/www/salesai/"

      - name: Verify deployment
        env:
          SAKURA_HOST: ${{ secrets.SAKURA_HOST }}
          SAKURA_USER: ${{ secrets.SAKURA_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${SAKURA_USER}@${SAKURA_HOST}" \
            'ls -la /home/businessgate/www/salesai/ | head -20'
